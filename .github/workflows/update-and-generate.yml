name: Update prices and generate page

on:
  push:
    branches: [main]
    paths:
      - companies.csv
      - generate_page.py
      - template.html
  workflow_dispatch:

jobs:
  update-and-generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Update prices
        run: uv run python update_prices.py

      - name: Generate page
        run: uv run python generate_page.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add companies.csv docs/index.html
          git diff --staged --quiet || git commit -m "Update prices and regenerate page [skip ci]"
          git push
