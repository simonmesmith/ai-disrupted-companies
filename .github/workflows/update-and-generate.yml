name: Update prices and deploy page

on:
  schedule:
    # Weekdays after US market close; yfinance will use the latest available close.
    - cron: "20 23 * * 1-5"
  push:
    branches: [main]
    paths:
      - companies.csv
      - src/**
      - tests/**
      - template.html
      - pyproject.toml
      - uv.lock
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  validate-csv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync

      - name: Validate CSV
        run: uv run ai-index-validate

  update-prices:
    needs: validate-csv
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync

      - name: Update prices
        run: uv run ai-index-update-prices

      - name: Commit and push updated prices
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add companies.csv
          git diff --staged --quiet || git commit -m "Update prices [skip ci]"
          git pull --rebase origin main
          git push

  deploy-page:
    needs: update-prices
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync

      - name: Pull latest prices
        run: git pull origin main

      - name: Generate page
        run: uv run ai-index-generate-page

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
